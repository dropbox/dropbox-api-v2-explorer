name: Spec Update

on:
  workflow_dispatch:
  repository_dispatch:
    types: [spec_update]

permissions:
  contents: read

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Update API specification
        id: update-spec
        shell: bash
        run: |
          old_commit="$(git rev-parse HEAD:codegen/spec)"
          git submodule update --remote codegen/spec
          new_commit="$(git -C codegen/spec rev-parse HEAD)"

          if [[ "$old_commit" == "$new_commit" ]]; then
            echo "has-changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          {
            echo "has-changes=true"
            echo "branch=spec_update_$(date -u +%Y_%m_%d)"
            echo "commit-message<<SPEC_COMMIT_MESSAGE"
            echo "Automated Spec Update"
            echo
            git -C codegen/spec log --format='- %s (%H)' "$old_commit..$new_commit"
            echo "SPEC_COMMIT_MESSAGE"
          } >> "$GITHUB_OUTPUT"
      - name: Install dependencies
        if: steps.update-spec.outputs.has-changes == 'true'
        run: |
          python -m pip install ./codegen/stone
          npm ci
      - name: Generate routes
        if: steps.update-spec.outputs.has-changes == 'true'
        run: ./codegen/run_codegen.sh
      - name: Verify generated site
        if: steps.update-spec.outputs.has-changes == 'true'
        run: |
          npm run lint
          npm run typecheck
          npm test
          npm run build
      - name: Create pull request
        if: steps.update-spec.outputs.has-changes == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.SPEC_UPDATE_TOKEN }}
          commit-message: ${{ steps.update-spec.outputs.commit-message }}
          branch: ${{ steps.update-spec.outputs.branch }}
          delete-branch: true
          title: Automated Spec Update
          body: ${{ steps.update-spec.outputs.commit-message }}
          base: main
          team-reviewers: |
            owners
            maintainers
          draft: false
