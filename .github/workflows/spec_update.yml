name: Spec Update

on:
  workflow_dispatch:
  repository_dispatch:
    types: [spec_update]

permissions:
  id-token: write
  contents: read

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::082972943155:role/oidc-github-dropbox-dropbox-api-v2-explorer-repo
          aws-region: us-west-2
      - name: Fetch GitHub App credentials from Secrets Manager
        uses: aws-actions/aws-secretsmanager-get-secrets@v3
        with:
          secret-ids: |
            SDK_UPDATER,sdk-updater-github-app
          parse-json-secrets: true
      - name: Generate GitHub App installation token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ env.SDK_UPDATER_CLIENT_ID }}
          private-key: ${{ env.SDK_UPDATER_PRIVATE_KEY }}
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Update API specification
        id: update-spec
        shell: bash
        run: |
          old_commit="$(git rev-parse HEAD:codegen/spec)"
          git submodule update --remote codegen/spec
          new_commit="$(git -C codegen/spec rev-parse HEAD)"

          if [[ "$old_commit" == "$new_commit" ]]; then
            echo "has-changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          {
            echo "has-changes=true"
            echo "branch=spec_update_$(date -u +%Y_%m_%d)"
            echo "commit-message<<SPEC_COMMIT_MESSAGE"
            echo "Automated Spec Update"
            echo
            git -C codegen/spec log --format='- %s (%H)' "$old_commit..$new_commit"
            echo "SPEC_COMMIT_MESSAGE"
          } >> "$GITHUB_OUTPUT"
      - name: Install dependencies
        if: steps.update-spec.outputs.has-changes == 'true'
        run: |
          python -m pip install ./codegen/stone
          npm ci
      - name: Generate routes
        if: steps.update-spec.outputs.has-changes == 'true'
        run: ./codegen/run_codegen.sh
      - name: Verify generated site
        if: steps.update-spec.outputs.has-changes == 'true'
        run: |
          npm run lint
          npm run typecheck
          npm test
          npm run build
      - name: Close old spec update pull requests
        id: close-old-prs
        if: steps.update-spec.outputs.has-changes == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          closed=""
          while read -r pr_num; do
            echo "Closing old PR #$pr_num"
            gh pr close "$pr_num" --delete-branch
            closed="${closed:+$closed,}$pr_num"
          done < <(
            gh pr list --state open --json number,headRefName \
              --jq '.[] | select(.headRefName | startswith("spec_update_")) | .number'
          )
          echo "closed=$closed" >> "$GITHUB_OUTPUT"
      - name: Create pull request
        id: create-pr
        if: steps.update-spec.outputs.has-changes == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ steps.app-token.outputs.token }}
          commit-message: ${{ steps.update-spec.outputs.commit-message }}
          branch: ${{ steps.update-spec.outputs.branch }}
          delete-branch: true
          title: Automated Spec Update
          body: ${{ steps.update-spec.outputs.commit-message }}
          base: main
          labels: automated-spec-update
          draft: false
      - name: Comment on closed pull requests
        if: steps.create-pr.outputs.pull-request-number && steps.close-old-prs.outputs.closed
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          IFS=',' read -ra prs <<< "${{ steps.close-old-prs.outputs.closed }}"
          for pr_num in "${prs[@]}"; do
            gh pr comment "$pr_num" \
              --body "Superseded by #${{ steps.create-pr.outputs.pull-request-number }}"
          done
